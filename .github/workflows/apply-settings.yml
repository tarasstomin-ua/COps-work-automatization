name: Apply Weather Settings

on:
  workflow_dispatch:
    inputs:
      city:
        description: "City name"
        required: true
      profile:
        description: "Weather profile (good/bad/harsh)"
        required: true
      user:
        description: "User who triggered the apply"
        required: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Apply settings
        env:
          BOLT_COOKIES: ${{ secrets.BOLT_COOKIES }}
        run: |
          python automation/apply.py "${{ github.event.inputs.city }}" "${{ github.event.inputs.profile }}" "${{ github.event.inputs.user }}"

      - name: Commit status update
        run: |
          git config user.name "COps Bot"
          git config user.email "cops-bot@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "Applied ${{ github.event.inputs.profile }} weather to ${{ github.event.inputs.city }} by ${{ github.event.inputs.user }}"
          git push
