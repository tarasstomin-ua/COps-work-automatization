<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Courier Ops — Ukraine Weather Settings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080a0f;--sf:#0f1218;--sf2:#151a22;--bd:#1c2230;--bd2:#252d3b;
  --tx:#d1d5db;--txb:#f0f2f5;--mu:#5c6370;--mu2:#3d4452;
  --good:#10b981;--goodH:#34d399;--goodBg:rgba(16,185,129,.08);
  --bad:#f59e0b;--badH:#fbbf24;--badBg:rgba(245,158,11,.08);
  --harsh:#ef4444;--harshH:#f87171;--harshBg:rgba(239,68,68,.08);
  --acc:#3b82f6;--accH:#60a5fa;--accBg:rgba(59,130,246,.06);
  --r:8px;--r2:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}

.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:10px}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr h1{font-size:16px;font-weight:700;color:var(--txb);letter-spacing:-.3px}
.hdr .pipe{width:1px;height:20px;background:var(--bd2)}
.hdr .sub{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;font-weight:500}
.hdr-r{display:flex;align-items:center;gap:16px}
.metric{text-align:center}
.metric-v{font-size:18px;font-weight:700;color:var(--txb)}
.metric-l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-top:1px}
.gh-link{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--acc);padding:5px 12px;background:var(--accBg);border-radius:20px;border:1px solid rgba(59,130,246,.15);text-decoration:none;transition:all .15s}
.gh-link:hover{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3)}
.gh-link svg{width:14px;height:14px;fill:currentColor}

.main{max-width:1440px;margin:0 auto;padding:20px 28px 40px}

.sec{margin-bottom:16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.sec-h{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;user-select:none;transition:background .15s}
.sec-h:hover{background:var(--sf2)}
.chv{font-size:11px;color:var(--mu);transition:transform .2s;width:16px;text-align:center}
.sec.closed .chv{transform:rotate(-90deg)}
.sec-h h2{font-size:13px;font-weight:600;color:var(--txb);text-transform:uppercase;letter-spacing:.5px}
.cnt{font-size:10px;color:var(--mu);background:var(--bg);padding:2px 8px;border-radius:10px;font-weight:600;margin-left:auto}
.sec-b{transition:max-height .35s ease,padding .2s ease;overflow:hidden;padding:0 18px 16px}
.sec.closed .sec-b{max-height:0!important;padding-top:0;padding-bottom:0}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:14px;transition:border-color .15s}
.card:hover{border-color:var(--bd2)}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.city-name{font-size:14px;font-weight:600;color:var(--txb)}
.admin-link{font-size:10px;color:var(--acc);text-decoration:none;opacity:.6;transition:opacity .15s}
.admin-link:hover{opacity:1}
.profile-tabs{display:flex;gap:4px;margin-bottom:10px}
.ptab{flex:1;padding:7px 0;border:1px solid var(--bd);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s;background:transparent;color:var(--mu)}
.ptab:hover{border-color:var(--bd2);color:var(--tx)}
.ptab.active.good{background:var(--goodBg);border-color:var(--good);color:var(--good)}
.ptab.active.bad{background:var(--badBg);border-color:var(--bad);color:var(--bad)}
.ptab.active.harsh{background:var(--harshBg);border-color:var(--harsh);color:var(--harsh)}
.card-body{min-height:60px}
.card-loading{display:flex;align-items:center;justify-content:center;padding:20px;color:var(--mu);font-size:11px}
.card-loading .spinner{width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.card-error{padding:10px;text-align:center;color:var(--harsh);font-size:11px}

.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kv{background:var(--sf);border-radius:6px;padding:8px 10px}
.kv-label{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.kv-val{font-size:13px;font-weight:600;color:var(--txb);font-family:"SF Mono",SFMono-Regular,Menlo,Consolas,monospace}
.kv.full{grid-column:1/-1}
.kv-row{display:flex;gap:8px;flex-wrap:wrap}
.kv-chip{font-size:10px;padding:2px 6px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;color:var(--tx)}
.kv-chip b{color:var(--txb);margin-right:3px}

.view-json-btn{display:block;width:100%;margin-top:8px;padding:6px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--mu);font-size:10px;cursor:pointer;transition:all .12s;text-align:center}
.view-json-btn:hover{border-color:var(--bd2);color:var(--tx);background:var(--sf)}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r2);padding:0;max-width:800px;width:95%;max-height:85vh;display:flex;flex-direction:column}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd)}
.modal-hdr h3{font-size:14px;color:var(--txb)}
.modal-close{background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px}
.modal-close:hover{background:var(--bg);color:var(--tx)}
.modal-body{overflow-y:auto;padding:16px 20px;flex:1}
.modal-body pre{font-size:12px;line-height:1.6;color:var(--tx);font-family:"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap;word-break:break-word}
.modal-body .json-key{color:var(--acc)}
.modal-body .json-str{color:var(--good)}
.modal-body .json-num{color:var(--bad)}
.modal-body .json-bool{color:#c084fc}
.modal-body .json-null{color:var(--mu)}
.modal-tabs{display:flex;gap:4px;padding:12px 20px 0;flex-wrap:wrap}
.modal-tab{padding:5px 14px;border:1px solid var(--bd);border-bottom:none;border-radius:6px 6px 0 0;background:transparent;color:var(--mu);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s}
.modal-tab.active{background:var(--sf2);color:var(--txb);border-color:var(--bd2)}
.modal-tab.good.active{color:var(--good)}.modal-tab.bad.active{color:var(--bad)}.modal-tab.harsh.active{color:var(--harsh)}

.compare-grid{display:grid;gap:1px;background:var(--bd)}
.compare-grid>div{background:var(--sf);padding:6px 10px;font-size:11px}
.compare-hdr{font-weight:600;color:var(--txb);text-transform:uppercase;font-size:9px;letter-spacing:.4px;position:sticky;top:0;z-index:1;background:var(--sf2)!important}
.compare-label{color:var(--mu);font-weight:500}
.compare-val{font-family:"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;color:var(--txb)}
.compare-diff{background:rgba(245,158,11,.05)!important}

.ov-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px 4px 8px;border-radius:6px;background:var(--bg);border:1px solid var(--bd);font-size:11px;cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--bd2);background:var(--sf2)}
.pill .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pill .pn{font-weight:600;color:var(--txb)}

.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 14px}
.search-bar input{flex:1;background:none;border:none;color:var(--txb);font-size:13px;outline:none}
.search-bar input::placeholder{color:var(--mu2)}
.search-icon{color:var(--mu);font-size:14px}

@media(max-width:640px){
  .hdr{padding:10px 16px}
  .main{padding:12px 16px 30px}
  .grid{grid-template-columns:1fr}
  .kv-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="hdr">

<div class="main">

  "Bila Tserkva": { group: "Tier 3", order: 2, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1079", base: "Secondary%20cities/Tier3%20cities/Bila%20Tserkva", profiles: ["good","harsh"], jsonName: "Bila Tserkva" },
  "Khmelnytskyi": { group: "Tier 3", order: 2, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1081", base: "Secondary%20cities/Tier3%20cities/Khmelnytskyi", profiles: ["good","harsh"], jsonName: "Khmelnytskyi" },
  "Rivne": { group: "Tier 3", order: 2, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1086", base: "Secondary%20cities/Tier3%20cities/Rivne", profiles: ["good","harsh"], jsonName: "Rivne" },

  "Brovary": { group: "Tier 3", order: 2, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1259", base: "Secondary%20cities/Tier3%20cities/Brovary", profiles: ["good","harsh"], jsonName: "Brovary" },

  "Mykolaiv": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/503", base: "Secondary%20cities/Rest%20of%20the%20cities/Mykolaiv", profiles: ["good","harsh"], jsonName: "Mykolaiv" },

  "Kremenchuk": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1088", base: "Secondary%20cities/Rest%20of%20the%20cities/Kremenchuk", profiles: ["good","harsh"], jsonName: "Kremenchuk" },
  "Kamianets-Podilskyi": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1132", base: "Secondary%20cities/Rest%20of%20the%20cities/Kamianets-Podilskyi", profiles: ["good","harsh"], jsonName: "Kamianets-Podilskyi" },

  "Mukachevo": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1179", base: "Secondary%20cities/Rest%20of%20the%20cities/Mukachevo", profiles: ["good","harsh"], jsonName: "Mukachevo" },

  "Vyshhorod": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1262", base: "Secondary%20cities/Rest%20of%20the%20cities/Vyshhorod", profiles: ["good","harsh"], jsonName: "Vyshhorod" },
  "Drohobych": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1348", base: "Secondary%20cities/Rest%20of%20the%20cities/Drohobych", profiles: ["good","harsh"], jsonName: "Drohobych" },
  "Truskavets": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/1357", base: "Secondary%20cities/Rest%20of%20the%20cities/Truskavets", profiles: ["good","harsh"], jsonName: "Truskavets" },
  "Kovel": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/2170", base: "Secondary%20cities/Rest%20of%20the%20cities/Kovel", profiles: ["good","harsh"], jsonName: "Kovel" },
  "Oleksandriia": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/2171", base: "Secondary%20cities/Rest%20of%20the%20cities/Oleksandriia", profiles: ["good","harsh"], jsonName: "Oleksandriia" },
  "Kolomyia": { group: "Rest of cities", order: 3, url: "https://admin-panel.bolt.eu/delivery-courier/settings/city/2499", base: "Secondary%20cities/Rest%20of%20the%20cities/Kolomyia", profiles: ["good","harsh"], jsonName: "Kolomyia" }
};

const PROFILE_META = {
  good:  { folder: "Good%20weather",  prefix: "Good%20Weather%20Settings"  },
  bad:   { folder: "Bad%20weather",   prefix: "Bad%20Weather%20Settings"   },
  harsh: { folder: "Harsh%20weather", prefix: "Harsh%20Weather%20Settings" }
};

const PROFILE_LABELS = { good: "Good", bad: "Bad", harsh: "Harsh" };
const PROFILE_LABELS_FULL = { good: "Good Weather", bad: "Bad Weather", harsh: "Harsh Weather" };

const cache = {};

function jsonUrl(cityName) {
  const c = CITIES[cityName];
  return function(profile) {
    const m = PROFILE_META[profile];
    return `${REPO_RAW}/${c.base}/${m.folder}/${m.prefix}%20${encodeURIComponent(c.jsonName)}.json`;
  };
}

async function fetchSettings(cityName, profile) {
  const key = cityName + ':' + profile;
  if (cache[key]) return cache[key];
  const url = jsonUrl(cityName)(profile);
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    cache[key] = data;
    return data;
  } catch(e) {
    return null;
  }
}

function extractKeyMetrics(data) {
  if (!data) return null;
  const ms = data.matching_settings || {};
  const dist = ms.matching_distance_limit_km || {};
  const dur = ms.target_order_duration_seconds || {};
  const batch = (data.batching || {}).food || {};
  const dm = data.dynamic_multiplier || {};
  const df = dm.delivery_fee || {};
  const ce = dm.courier_earning || {};
  const eta = data.eta_settings || {};
  const avail = data.availability || {};
  const rs = avail.radius_shrinkage || {};
  return {
    dist_bicycle: dist.bicycle, dist_car: dist.car, dist_moto: dist.motorbike, dist_ped: dist.pedestrian,
    dur_bicycle: dur.bicycle, dur_car: dur.car, dur_moto: dur.motorbike, dur_ped: dur.pedestrian,
    batch_enabled: batch.is_enabled, batch_max: batch.max_batch_size,
    batch_min_delay: batch.min_delay_seconds, batch_max_delay: batch.max_delay_seconds,
    df_enabled: df.is_enabled, df_min_br: df.min_busy_ratio, df_max_br: df.max_busy_ratio,
    df_min_mult: df.min_multiplier, df_max_mult: df.max_multiplier,
    ce_enabled: ce.is_enabled,
    eta_arrive_before: eta.arrive_before_order_is_ready_seconds,
    rs_max_ratio: rs.ratio_where_radius_is_maximum, rs_min_ratio: rs.ratio_where_radius_is_minimum,
    parallel_max_dist: ((ms.parallel || {}).food || {}).max_distance_courier_to_provider_km,
    parallel_max_delay: ((ms.parallel || {}).food || {}).matching_maximum_delay_seconds
  };
}

function renderMetrics(m) {
  if (!m) return '<div class="card-error">Failed to load settings</div>';
  return `
    <div class="kv-grid">
      <div class="kv"><div class="kv-label">Matching distance (km)</div><div class="kv-row">
        <span class="kv-chip"><b>Ped</b>${m.dist_ped ?? '—'}</span>
        <span class="kv-chip"><b>Bike</b>${m.dist_bicycle ?? '—'}</span>
        <span class="kv-chip"><b>Moto</b>${m.dist_moto ?? '—'}</span>
        <span class="kv-chip"><b>Car</b>${m.dist_car ?? '—'}</span>
      </div></div>
      <div class="kv"><div class="kv-label">Target duration (sec)</div><div class="kv-row">
        <span class="kv-chip"><b>Ped</b>${m.dur_ped ?? '—'}</span>
        <span class="kv-chip"><b>Bike</b>${m.dur_bicycle ?? '—'}</span>
        <span class="kv-chip"><b>Moto</b>${m.dur_moto ?? '—'}</span>
        <span class="kv-chip"><b>Car</b>${m.dur_car ?? '—'}</span>
      </div></div>
      <div class="kv"><div class="kv-label">Batching</div><div class="kv-val">${m.batch_enabled ? 'ON' : 'OFF'} &middot; max ${m.batch_max ?? '—'} &middot; ${m.batch_min_delay ?? '—'}–${m.batch_max_delay ?? '—'}s</div></div>
      <div class="kv"><div class="kv-label">Delivery fee surge</div><div class="kv-val">${m.df_enabled ? 'ON' : 'OFF'} &middot; BR ${m.df_min_br ?? '—'}–${m.df_max_br ?? '—'} &middot; ×${m.df_min_mult ?? '—'}–${m.df_max_mult ?? '—'}</div></div>
      <div class="kv"><div class="kv-label">ETA arrive before</div><div class="kv-val">${m.eta_arrive_before ?? '—'}s</div></div>
      <div class="kv"><div class="kv-label">Radius shrinkage</div><div class="kv-val">${m.rs_max_ratio ?? '—'} → ${m.rs_min_ratio ?? '—'}</div></div>
    </div>`;
}

function syntaxHighlight(json) {
  const str = JSON.stringify(json, null, 2);
  return str.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|null)/g, function(match) {
    let cls = 'json-num';
    if (/^"/.test(match)) {
      cls = /:$/.test(match) ? 'json-key' : 'json-str';
    } else if (/true|false/.test(match)) {
      cls = 'json-bool';
    } else if (/null/.test(match)) {
      cls = 'json-null';
    }
    return '<span class="' + cls + '">' + match + '</span>';
  });
}

function toggleSec(id) { document.getElementById(id).classList.toggle('closed'); }

function cardId(name) { return 'card-' + name.replace(/[^a-zA-Z0-9]/g, '_'); }

async function selectProfile(cityName, profile) {
  const card = document.getElementById(cardId(cityName));
  if (!card) return;
  card.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  const tab = card.querySelector(`.ptab[data-prof="${profile}"]`);
  if (tab) tab.classList.add('active');

  const body = card.querySelector('.card-body');
  body.innerHTML = '<div class="card-loading"><div class="spinner"></div>Loading settings...</div>';

  const data = await fetchSettings(cityName, profile);
  const metrics = extractKeyMetrics(data);
  body.innerHTML = renderMetrics(metrics);

  if (data) {
    body.innerHTML += `<button class="view-json-btn" onclick="openModal('${cityName}','${profile}')">View full JSON</button>`;
  }
}

let currentModalCity = null;
let currentModalProfile = null;

async function openModal(cityName, profile) {
  currentModalCity = cityName;
  currentModalProfile = profile;
  const city = CITIES[cityName];
  document.getElementById('modalTitle').textContent = cityName + ' — Settings';

  const tabs = document.getElementById('modalTabs');
  tabs.innerHTML = city.profiles.map(p =>
    `<button class="modal-tab ${p} ${p === profile ? 'active' : ''}" onclick="switchModalTab('${cityName}','${p}')">${PROFILE_LABELS_FULL[p]}</button>`
  ).join('');

  await renderModalJson(cityName, profile);
  document.getElementById('jsonOverlay').classList.add('open');
}

async function switchModalTab(cityName, profile) {
  currentModalProfile = profile;
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.modal-tab.${profile}`).classList.add('active');
  await renderModalJson(cityName, profile);
}

async function renderModalJson(cityName, profile) {
  const pre = document.getElementById('modalJson');
  pre.innerHTML = '<div class="card-loading"><div class="spinner"></div>Loading...</div>';
  const data = await fetchSettings(cityName, profile);
  if (data) {
    pre.innerHTML = syntaxHighlight(data);
  } else {
    pre.innerHTML = '<span style="color:var(--harsh)">Failed to load settings file</span>';
  }
}

function closeModal() {
  document.getElementById('jsonOverlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('jsonOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function buildGroups() {
  const groups = {};
  for (const [name, cfg] of Object.entries(CITIES)) {
    if (!groups[cfg.group]) groups[cfg.group] = { order: cfg.order, cities: [] };
    groups[cfg.group].cities.push(name);
  }
  return Object.entries(groups).sort((a, b) => a[1].order - b[1].order);
}

function renderCitySections(filter) {
  const groups = buildGroups();
  const wrap = document.getElementById('city-sections');
  const saved = {};
  wrap.querySelectorAll('.sec').forEach(s => { saved[s.id] = s.classList.contains('closed'); });

  let html = '';
  let totalConfigs = 0;
  const filterLower = (filter || '').toLowerCase();

  groups.forEach(([ groupName, groupData ], i) => {
    const filteredCities = filterLower
      ? groupData.cities.filter(c => c.toLowerCase().includes(filterLower))
      : groupData.cities;
    if (filteredCities.length === 0) return;

    totalConfigs += filteredCities.reduce((s, c) => s + CITIES[c].profiles.length, 0);
    const id = 'sec-g-' + i;
    const closed = id in saved ? saved[id] : (i > 0 && !filterLower);

    const cards = filteredCities.map(cityName => {
      const city = CITIES[cityName];
      const tabs = city.profiles.map(p =>
        `<button class="ptab ${p}" data-prof="${p}" onclick="selectProfile('${cityName}','${p}')">${PROFILE_LABELS[p]}</button>`
      ).join('');
      return `<div class="card" id="${cardId(cityName)}">
        <div class="card-top">
          <span class="city-name">${cityName}</span>
          <a class="admin-link" href="${city.url}" target="_blank" title="Open admin panel">Admin &#8599;</a>
        </div>
        <div class="profile-tabs">${tabs}</div>
        <div class="card-body"><div style="padding:16px;text-align:center;color:var(--mu);font-size:11px">Select a weather profile above</div></div>
      </div>`;
    }).join('');

    html += `<div class="sec ${closed ? 'closed' : ''}" id="${id}">
      <div class="sec-h" onclick="toggleSec('${id}')">
        <span class="chv">&#9662;</span><h2>${groupName}</h2>
        <span class="cnt">${filteredCities.length} cities</span>
      </div>
      <div class="sec-b" style="max-height:8000px"><div class="grid">${cards}</div></div>
    </div>`;
  });

  wrap.innerHTML = html;
  document.getElementById('hProfiles').textContent = totalConfigs;
}

function filterCities(val) {
  renderCitySections(val);
}

renderCitySections();
document.getElementById('hCities').textContent = Object.keys(CITIES).length;
</script>
</body>
</html>
